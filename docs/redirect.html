<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>正在跳转...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 1rem;
      border: 4px solid #e0e0e0;
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      color: #d32f2f;
      display: none;
    }
    .manual-link {
      display: none;
      margin-top: 1rem;
      word-break: break-all;
    }
    .manual-link a {
      color: #4a90d9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="status">正在跳转到服务器...</p>
    <p class="error" id="error">服务器当前不在线，请稍后再试。</p>
    <p class="manual-link" id="manualLink">
      <a id="tunnelLink" href="#"></a>
    </p>
  </div>
  <script>
    // TUNNEL_URL 占位符，由 server.js 自动替换
    const TUNNEL_URL = 'https://productivity-arising-alabama-scsi.trycloudflare.com';

    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const error = document.getElementById('error');
    const manualLink = document.getElementById('manualLink');
    const tunnelLink = document.getElementById('tunnelLink');

    if (TUNNEL_URL && TUNNEL_URL.includes('.trycloudflare.com')) {
      // 读取 hash 后缀（如 #/123/index.html），拼接到 tunnel URL
      const suffix = location.hash; // 带 # 号，如 "#/123" 或空串
      const target = TUNNEL_URL + suffix;

      window.location.href = target;
      // 显示备用链接以防跳转被阻止
      tunnelLink.href = target;
      tunnelLink.textContent = target;
      manualLink.style.display = 'block';
      status.textContent = '正在跳转，如未自动跳转请点击下方链接...';
    } else {
      // URL 无效，服务器可能离线
      spinner.style.display = 'none';
      status.style.display = 'none';
      error.style.display = 'block';
    }
  </script>
</body>
</html>
