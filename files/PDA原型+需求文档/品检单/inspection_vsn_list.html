<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品检VSN列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background-color: white;
            z-index: 100;
        }
        
        .back-btn {
            font-size: 24px;
            margin-right: 16px;
            cursor: pointer;
        }
        
        .title {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }
        
        .material-info-bar {
            padding: 12px 16px;
            background-color: #e8f5e8;
            border-bottom: 1px solid #c8e6c9;
        }
        
        .material-info-bar div {
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .material-info-bar div:last-child {
            margin-bottom: 0;
        }
        
        .material-info-bar .material-name {
            font-weight: 500;
            color: #2e7d32;
        }
        
        .search-section {
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background-color: #f5f5f5;
            border-radius: 20px;
            padding: 8px 16px;
        }
        
        .search-icon {
            font-size: 14px;
            margin-right: 8px;
        }
        
        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
        }
        
        .count-info {
            font-size: 14px;
            color: #666;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #fafafa;
        }
        
        .vsn-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        .vsn-table th {
            background-color: #f5f5f5;
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 500;
            position: sticky;
            top: 88px;
        }
        
        .vsn-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .vsn-table tr:last-child td {
            border-bottom: none;
        }
        
        .action-icons {
            display: flex;
            gap: 12px;
        }
        
        .action-icons span {
            font-size: 16px;
            cursor: pointer;
        }
        
        .action-icons span:first-child {
            color: #1976d2;
        }
        
        .action-icons span:last-child {
            color: #f44336;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .pagination-section {
            padding: 12px 16px;
            border-top: 1px solid #e0e0e0;
            background-color: #fafafa;
            margin-bottom: 60px;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        
        .pagination-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }
        
        .pagination-btn:hover {
            background-color: #f0f0f0;
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            font-size: 13px;
            color: #666;
        }
        
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 470px;
            padding: 8px 0;
            background-color: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            box-sizing: border-box;
        }
        
        .bottom-btn {
            flex: 1;
            padding: 10px 14px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            max-width: calc(50% - 5px);
        }
        
        .confirm-btn {
            background-color: #388e3c;
            color: white;
        }
        
        .cancel-btn {
            background-color: #f5f5f5;
            color: #666;
        }
        
        .inspection-result {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .inspection-result.good {
            background-color: #e8f5e8;
            color: #388e3c;
        }
        
        .inspection-result.bad {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="back-btn" onclick="window.history.back()">←</div>
            <div class="title">VSN列表</div>
            <div style="width: 24px;"></div>
        </div>
        
        <div class="material-info-bar">
            <div class="material-name">META3 背盖不锈钢摄像头装饰件</div>
            <div>物料编码: CM3-63008-02 | 应检数量: 200</div>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="搜索VSN码" id="searchInput">
            </div>
        </div>
        
        <div class="count-info">
            共 <span style="color: #388e3c; font-weight: 500;">200</span> 条记录，当前显示第 <span style="color: #388e3c; font-weight: 500;">1-20</span> 条
        </div>
        
        <table class="vsn-table" id="vsnTable">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>VSN</th>
                    <th>库位</th>
                    <th>良品数量</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📦</div>
            <div>暂无VSN数据</div>
        </div>
        
        <div class="pagination-section" id="paginationSection">
            <div class="pagination">
                <button class="pagination-btn" id="prevBtn" disabled>←</button>
                <span class="page-info" id="pageInfo">第 1/10 页</span>
                <button class="pagination-btn" id="nextBtn">→</button>
            </div>
        </div>
        
        <div class="bottom-bar">
            <div class="bottom-btn cancel-btn" onclick="window.history.back()">返回</div>
            <div class="bottom-btn confirm-btn" onclick="confirmVSN()">确认</div>
        </div>
    </div>
    
    <script>
        function generateVSNData(count) {
            const data = [];
            for (let i = 1; i <= count; i++) {
                data.push({
                    id: i,
                    vsn: 'V' + String(i).padStart(8, '0'),
                    location: 'LL-' + String(Math.floor(Math.random() * 10) + 1) + '-0' + String(Math.floor(Math.random() * 9) + 1),
                    goodQty: 1
                });
            }
            return data;
        }
        
        const pageSize = 20;
        let currentPage = 1;
        const totalData = generateVSNData(200);
        const totalPages = Math.ceil(totalData.length / pageSize);
        
        function getCurrentPageData() {
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            return totalData.slice(startIndex, endIndex);
        }
        
        function renderTable(data) {
            const tbody = document.querySelector('#vsnTable tbody');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                document.querySelector('#emptyState').style.display = 'flex';
                document.querySelector('#vsnTable').style.display = 'none';
                return;
            }
            
            document.querySelector('#emptyState').style.display = 'none';
            document.querySelector('#vsnTable').style.display = 'table';
            
            data.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${(currentPage - 1) * pageSize + index + 1}</td>
                    <td style="font-family: monospace;">${item.vsn}</td>
                    <td>${item.location}</td>
                    <td>1</td>
                    <td>
                        <div class="action-icons">
                            <span class="print-icon" onclick="printVSN('${item.vsn}')">🖨️</span>
                            <span class="delete-icon" onclick="deleteRow(this)">🗑️</span>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            updatePagination();
        }
        
        function updatePagination() {
            const pageInfo = document.querySelector('#pageInfo');
            const prevBtn = document.querySelector('#prevBtn');
            const nextBtn = document.querySelector('#nextBtn');
            
            pageInfo.textContent = `第 ${currentPage}/${totalPages} 页`;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
        }
        
        document.querySelector('#prevBtn').addEventListener('click', function() {
            if (currentPage > 1) {
                currentPage--;
                renderTable(getCurrentPageData());
            }
        });
        
        document.querySelector('#nextBtn').addEventListener('click', function() {
            if (currentPage < totalPages) {
                currentPage++;
                renderTable(getCurrentPageData());
            }
        });
        
        document.querySelector('#searchInput').addEventListener('input', function(e) {
            const searchText = e.target.value.toLowerCase();
            const filtered = totalData.filter(item => item.vsn.toLowerCase().includes(searchText));
            
            currentPage = 1;
            renderTable(filtered);
        });
        
        function printVSN(vsn) {
            alert(`打印VSN标签: ${vsn}`);
        }
        
        function deleteRow(element) {
            if (confirm('确定要删除这条记录吗？')) {
                element.closest('tr').remove();
            }
        }
        
        function confirmVSN() {
            alert('VSN确认成功');
            window.history.back();
        }
        
        renderTable(getCurrentPageData());
    </script>
</body>
</html>
